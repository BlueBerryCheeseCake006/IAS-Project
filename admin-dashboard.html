<!DOCTYPE html>
<html lang="en">
<head>
    <title>Code Breaker | Admin Command</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="app-shell">
    <div class="container dashboard-container page-shell">
        <h2>Administrator Command Center</h2>
        <p>Clearance Level: SYSTEM ADMIN</p>

        <div id="adminNotice" class="success-msg"></div>

        <div class="page-grid" id="adminMetrics">
            <div class="stat-card">
                <span class="stat-label">Total Registered Users</span>
                <div class="stat-value" id="totalUsersMetric">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Locked Accounts</span>
                <div class="stat-value" id="lockedAccountsMetric">0</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Failed Logins (24h)</span>
                <div class="stat-value" id="failedLoginsMetric">0</div>
            </div>
        </div>

        <div class="section-card">
            <h3>Advanced User Management</h3>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>2FA</th>
                        <th>Force Reset</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="userManagementBody"></tbody>
            </table>
        </div>

        <div class="section-card">
            <h3>System Activity Logs</h3>
            <div class="table-controls">
                <input type="text" id="logUserFilter" placeholder="Filter by username">
                <select id="logEventFilter">
                    <option value="">All Events</option>
                    <option value="Failed">Failed Logins</option>
                    <option value="Successful">Successful Logins</option>
                    <option value="Password">Password Events</option>
                    <option value="Account">Account Events</option>
                    <option value="Unlock">Unlock Actions</option>
                </select>
                <button type="button" class="secondary" id="clearLogFiltersBtn" style="width: auto;">Clear Filters</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>User</th>
                        <th>Event Status</th>
                    </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>

        <button class="danger" onclick="logout()" style="width: 220px; margin-top: 30px;">Secure Logout</button>
    </div>

    <script src="assets/js/session.js"></script>
    <script src="assets/js/logger.js"></script>
    <script src="assets/js/password-ui.js"></script>
    <script src="assets/js/dashboard.js"></script>
    <script>
        const admin = enforceSession('admin');
        if (admin) displayLogs();
    </script>
</body>
</html>
