<!DOCTYPE html>
<html lang="en">
<head>
    <title>Code Breaker | Register</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Registration</h2>
        <div id="sessionNotice" class="success-msg"></div>

        <form id="regForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" required>
            </div>
            <div class="form-group">
                <label>Secure Password</label>
                <input type="password" id="regPassword" required>
                <div class="meter-shell" style="margin-top: 10px;">
                    <div class="meter-track"><div id="regPasswordMeter" class="meter-fill weak"></div></div>
                    <div id="regPasswordStrengthText" class="meter-label">Password strength: weak</div>
                </div>
            </div>
            <div class="form-group">
                <label>Security Question</label>
                <select id="regSecurityQuestion" required style="width:100%; padding:12px; border:1px solid #334155; border-radius:6px; background:#0f172a; color:white; font-size:15px;">
                    <option value="">-- Select a question --</option>
                    <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                    <option value="What was the name of your first pet?">What was the name of your first pet?</option>
                    <option value="What city were you born in?">What city were you born in?</option>
                    <option value="What is your favorite color?">What is your favorite color?</option>
                    <option value="What was the name of your elementary school?">What was the name of your elementary school?</option>
                    <option value="What is your favorite movie?">What is your favorite movie?</option>
                </select>
            </div>
            <div class="form-group">
                <label>Security Answer <span style="font-size:12px; color:var(--text-muted);">(keep this private)</span></label>
                <input type="text" id="regSecurityAnswer" required autocomplete="off">
            </div>
            <button type="submit">Generate Credentials</button>
            <div id="regError" class="error-msg"></div>
            <p style="margin-top: 15px; font-size: 14px;"><a class="help-link" href="login.html">Return to Login</a></p>
        </form>
    </div>

    <script src="assets/js/session.js"></script>
    <script src="assets/js/logger.js"></script>
    <script src="assets/js/password-ui.js"></script>
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/register.js"></script>
    <script>
        const notice = consumeSessionNotice();
        if (notice) document.getElementById('sessionNotice').innerText = notice;
    </script>
</body>
</html>
