<!DOCTYPE html>
<html lang="en">
<head>
    <title>Code Breaker | Secure Login</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Log In</h2>
        <div id="sessionNotice" class="success-msg"></div>

        <!-- Step 1: Password Login -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit">Initiate Secure Login</button>
            <div id="loginError" class="error-msg"></div>
            <div class="form-actions" style="margin-top: 15px; font-size: 14px;">
                <p>No clearance? <a class="help-link" href="register.html">Register</a></p>
                <p><a class="help-link" href="forgot-password.html">Forgot Password?</a></p>
            </div>
        </form>

        <!-- Step 2: Security Question -->
        <form id="securityQuestionForm" class="hidden" onsubmit="verifySecurityQuestion(event)">
            <p style="margin-bottom: 16px; color: var(--text-muted);">Answer your security question to continue.</p>
            <div class="section-card" style="margin-bottom: 16px; padding: 14px; text-align: left;">
                <span style="font-size: 13px; color: var(--text-muted);">Security Question</span>
                <p id="securityQuestionText" style="color: var(--text-main); margin: 6px 0 0; font-weight: 600;"></p>
            </div>
            <div class="form-group">
                <label>Your Answer</label>
                <input type="text" id="securityAnswerInput" required autocomplete="off">
            </div>
            <button type="submit">Verify Answer</button>
            <div id="securityQuestionError" class="error-msg"></div>
        </form>

        <!-- Step 3: OTP -->
        <form id="otpForm" class="hidden" onsubmit="verifyOTP(event)">
            <p style="margin-bottom: 16px;">A One-Time Password has been sent to your email.</p>
            <div class="form-group">
                <label>Enter 6-Digit OTP</label>
                <input type="text" id="otpInput" required autocomplete="off" maxlength="6">
            </div>
            <button type="submit">Verify Identity</button>
            <div id="otpError" class="error-msg"></div>
            <div style="margin-top: 12px; font-size: 14px; text-align: center;">
                Didn't receive a code?
                <a href="#" class="help-link" id="resendOtpLink" onclick="resendOTP(event)">Resend OTP</a>
                <span id="resendCooldown" style="display:none; color: #aaa;"></span>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="assets/js/session.js"></script>
    <script src="assets/js/logger.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        const notice = consumeSessionNotice();
        if (notice) document.getElementById('sessionNotice').innerText = notice;
    </script>
</body>
</html>
