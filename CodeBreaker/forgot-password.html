<!DOCTYPE html>
<html lang="en">
<head>
    <title>Code Breaker | Forgot Password</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Password Recovery</h2>
        <p>Enter your email to request a reset OTP.</p>
        <div id="recoveryMessage" class="success-msg"></div>

        <form id="recoveryRequestForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="recoveryEmail" required>
            </div>
            <button type="submit">Send Reset OTP</button>
        </form>

        <form id="recoveryOtpForm" class="hidden" style="margin-top: 20px;">
            <div class="form-group">
                <label>Reset OTP</label>
                <input type="text" id="recoveryOtpInput" required autocomplete="off">
            </div>
            <button type="submit">Verify Code</button>
            <div id="recoveryOtpError" class="error-msg"></div>
        </form>

        <p style="margin-top: 15px; font-size: 14px;"><a class="help-link" href="login.html">Back to Login</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="assets/js/session.js"></script>
    <script src="assets/js/logger.js"></script>
    <script src="assets/js/recovery.js"></script>
</body>
</html>
