<!DOCTYPE html>
<html lang="en">
<head>
    <title>Code Breaker | Register</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Registration</h2>
        <div id="sessionNotice" class="success-msg"></div>
        
        <form id="regForm" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" required>
            </div>
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="regUsername" required>
            </div>
            <div class="form-group">
                <label>Secure Password</label>
                <input type="password" id="regPassword" required title="Minimum 8 characters, at least 1 uppercase, 1 lowercase, 1 number">
                <div class="meter-shell" style="margin-top: 10px;">
                    <div class="meter-track"><div id="regPasswordMeter" class="meter-fill weak"></div></div>
                    <div id="regPasswordStrengthText" class="meter-label">Password strength: weak</div>
                </div>
            </div>
            <button type="submit">Generate Credentials</button>
            <div id="regError" class="error-msg"></div>
            <p style="margin-top: 15px; font-size: 14px;"><a class="help-link" href="login.html">Return to Login</a></p>
        </form>

        <form id="verifyForm" class="hidden" onsubmit="verifyRegistration(event)">
            <p>Verification code sent to your email.</p>
            <div class="form-group">
                <label>Enter Verification Code</label>
                <input type="text" id="verifyInput" required>
            </div>
            <button type="submit">Complete Registration</button>
            <div id="verifyError" class="error-msg"></div>
        </form>
    </div>

    <script src="assets/js/session.js"></script>
    <script src="assets/js/logger.js"></script>
    <script src="assets/js/password-ui.js"></script>
    <script type="module" src="assets/js/firebase-config.js"></script>
    <script type="module" src="assets/js/register.js"></script>
</body>
</html>
