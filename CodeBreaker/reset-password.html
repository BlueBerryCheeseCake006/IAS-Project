<!DOCTYPE html>
<html lang="en">
<head>
    <title>Code Breaker | Reset Password</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p>Set a new password for <strong id="resetTargetLabel">your account</strong>.</p>
        <div id="resetMessage" class="success-msg"></div>

        <form id="resetPasswordForm">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" required>
                <div class="meter-shell" style="margin-top: 10px;">
                    <div class="meter-track"><div id="newPasswordMeter" class="meter-fill weak"></div></div>
                    <div id="newPasswordStrengthText" class="meter-label">Password strength: weak</div>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
            <button type="submit">Update Password</button>
        </form>
    </div>

    <script src="assets/js/session.js"></script>
    <script src="assets/js/logger.js"></script>
    <script src="assets/js/password-ui.js"></script>
    <script src="assets/js/recovery.js"></script>
</body>
</html>
